name: bench-regression

on:
  push:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: python bench.py --json bench_output.json

      - name: Compare against baseline
        id: compare
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          baseline = json.loads(Path("bench_baseline.json").read_text(encoding="utf-8"))
          current = json.loads(Path("bench_output.json").read_text(encoding="utf-8"))

          base_conf = baseline["policies"]["confidence"]
          cur_conf = current["policies"]["confidence"]

          faults_delta = (cur_conf["faults"] - base_conf["faults"]) / max(base_conf["faults"], 1)
          frag_delta = (cur_conf["external_frag"] - base_conf["external_frag"]) / max(base_conf["external_frag"], 1e-9)
          regression = faults_delta > 0.05 or frag_delta > 0.10

          lines = [
              "| Metric | Baseline | Current | Delta |",
              "| --- | ---: | ---: | ---: |",
              f"| confidence faults | {base_conf['faults']} | {cur_conf['faults']} | {faults_delta * 100:.2f}% |",
              f"| confidence external_frag | {base_conf['external_frag']:.3f} | {cur_conf['external_frag']:.3f} | {frag_delta * 100:.2f}% |",
          ]
          Path("bench_delta.md").write_text("\n".join(lines), encoding="utf-8")
          Path("regression_flag.txt").write_text("true" if regression else "false", encoding="utf-8")
          PY
          echo "regression=$(cat regression_flag.txt)" >> "$GITHUB_OUTPUT"

      - name: Comment on regression
        if: steps.compare.outputs.regression == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = [
              "HBM benchmark regression detected on `main`.",
              "",
              fs.readFileSync("bench_delta.md", "utf8"),
            ].join("\n");
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

      - name: Fail on regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          cat bench_delta.md
          exit 1

      - name: Update baseline
        if: steps.compare.outputs.regression != 'true'
        run: cp bench_output.json bench_baseline.json

      - name: Commit updated baseline
        if: steps.compare.outputs.regression != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh benchmark baseline [skip ci]"
          file_pattern: bench_baseline.json
